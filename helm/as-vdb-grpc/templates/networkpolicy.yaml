{{- if .Values.config.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "as-vdb-grpc.fullname" . }}-config-whitelist
  namespace: {{ include "as-vdb-grpc.namespace" . }}
  labels:
    {{- include "as-vdb-grpc.labels" . | nindent 4 }}
    app.kubernetes.io/component: config-networkpolicy
spec:
  podSelector:
    matchLabels:
      {{- include "as-vdb-grpc.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: config
  policyTypes:
    - Egress
  egress:
    # Allow connections to FTL server
    - to:
        - podSelector:
            matchLabels:
              {{- include "as-vdb-grpc.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: ftlserver
      ports:
        - protocol: TCP
          port: {{ .Values.ftlserver.service.targetPort }}
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
{{- end }}
{{- end }}