{{- if and .Values.ingress.enabled .Values.ingress.pgadmin.enabled .Values.pgadmin.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "postgresql.fullname" . }}-pgadmin
  namespace: {{ include "postgresql.namespace" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgadmin-ingress
  {{- $annotations := dict }}
  {{- if .Values.ingress.annotations }}
    {{- $annotations = .Values.ingress.annotations }}
  {{- end }}
  {{- if .Values.ingress.pgadmin.annotations }}
    {{- $annotations = merge $annotations .Values.ingress.pgadmin.annotations }}
  {{- end }}
  {{- if .Values.ingress.className }}
    {{- $annotations = merge $annotations (dict "kubernetes.io/ingress.class" .Values.ingress.className) }}
  {{- end }}
  {{- if .Values.ingress.whitelistSourceRanges }}
    {{- $whitelist := join ", " .Values.ingress.whitelistSourceRanges }}
    {{- $annotations = merge $annotations (dict "nginx.ingress.kubernetes.io/whitelist-source-range" $whitelist) }}
  {{- end }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.pgadmin.tls.enabled }}
  tls:
    - hosts:
        - {{ printf "%s.%s" .Values.ingress.pgadmin.host .Values.coreDnsName | quote }}
      secretName: {{ .Values.ingress.pgadmin.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ printf "%s.%s" .Values.ingress.pgadmin.host .Values.coreDnsName | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.pgadmin.path }}
            pathType: {{ .Values.ingress.pgadmin.pathType }}
            backend:
              service:
                name: {{ include "postgresql.fullname" . }}-pgadmin
                port:
                  number: {{ .Values.pgadmin.service.port }}
{{- end }}