{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "postgresql.fullname" . }}-postgresql
  namespace: {{ include "postgresql.namespace" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "postgresql.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "postgresql.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "postgresql.serviceAccountName" . }}
      {{- if .Values.postgresql.persistence.enabled }}
      initContainers:
        - name: fix-ownership
          image: busybox:1.35
          command: ['sh', '-c']
          args:
            - |
              echo "Fixing ownership of /var/lib/postgresql/data..."
              chown -R 999:999 /var/lib/postgresql/data
              chmod 700 /var/lib/postgresql/data
              echo "Ownership fixed!"
          securityContext:
            runAsUser: 0  # Run as root to fix ownership
          volumeMounts:
            - name: postgresql-storage
              mountPath: /var/lib/postgresql/data
      {{- end }}
      containers:
        - name: postgresql
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "postgresql.imageRepository" (dict "root" . "image" .Values.postgresql.image) }}:{{ include "postgresql.imageTag" (dict "tag" .Values.postgresql.image.tag) }}
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: postgresql
              containerPort: {{ .Values.postgresql.service.targetPort }}
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database.name | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.database.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql.fullname" . }}-secret
                  key: postgresql-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            {{- if .Values.postgresql.persistence.enabled }}
            - name: postgresql-storage
              mountPath: /var/lib/postgresql/data
            {{- end }}
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U "{{ .Values.postgresql.database.user }}" -d "{{ .Values.postgresql.database.name }}" -h 127.0.0.1 -p {{ .Values.postgresql.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U "{{ .Values.postgresql.database.user }}" -d "{{ .Values.postgresql.database.name }}" -h 127.0.0.1 -p {{ .Values.postgresql.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
      volumes:
        {{- if .Values.postgresql.persistence.enabled }}
        - name: postgresql-storage
          persistentVolumeClaim:
            claimName: {{ include "postgresql.fullname" . }}-postgresql-pvc
        {{- end }}
      restartPolicy: Always
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}